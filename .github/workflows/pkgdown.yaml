# Build a pkgdown site and deploy to gh-pages.

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Use pre-rendered vignette HTML
        run: |
          mkdir -p .pkgdown-vignettes
          find vignettes -maxdepth 1 -name '*.Rmd' -exec mv {} .pkgdown-vignettes/ \;
          Rscript -e 'cfg <- yaml::read_yaml("_pkgdown.yml"); cfg$articles <- NULL; cfg$navbar$structure$left <- setdiff(cfg$navbar$structure$left, "articles"); yaml::write_yaml(cfg, "_pkgdown.yml")'

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Copy vignette HTML
        run: |
          mkdir -p docs/articles
          cp vignettes/*.html docs/articles/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
